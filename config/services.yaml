# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    admin_email: 'azizmchela00@gmail.com'
    gemini_api_key: '%env(GEMINI_API_KEY)%'
    gemini_model: '%env(GEMINI_MODEL)%'
    groq_api_key: '%env(GROQ_API_KEY)%'
    groq_model: '%env(GROQ_MODEL)%'
    face_recognition_api_url: '%env(FACE_RECOGNITION_API_URL)%'
    python_assistant_api_base_url: '%env(PYTHON_ASSISTANT_API_BASE_URL)%'
    ai_api_base_url: '%env(AI_API_BASE_URL)%'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_public_key: '%env(STRIPE_PUBLIC_KEY)%'
    elevenlabs_api_key: '%env(ELEVENLABS_API_KEY)%'
    elevenlabs_voice_id: '%env(ELEVENLABS_VOICE_ID)%'
    google_cloud_translate_api_key: '%env(default::GOOGLE_CLOUD_TRANSLATE_API_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $projectDir: '%kernel.project_dir%'
            string $faceRecognitionApiUrl: '%face_recognition_api_url%'
            string $pythonAssistantApiBaseUrl: '%python_assistant_api_base_url%'
            string $aiApiBaseUrl: '%ai_api_base_url%'
            string $elevenLabsApiKey: '%elevenlabs_api_key%'
            string $elevenLabsVoiceId: '%elevenlabs_voice_id%'

    App\Service\GoogleCloudTranslationService:
        arguments:
            $apiKey: '%google_cloud_translate_api_key%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Domain/*/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones


